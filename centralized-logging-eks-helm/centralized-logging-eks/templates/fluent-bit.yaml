{{- if and .Values.fluentBit.enabled .Values.kafka.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cl.fullname" . }}-fluent-bit
  namespace: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cl.fullname" . }}-fluent-bit-read
  labels:
{{ include "cl.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cl.fullname" . }}-fluent-bit-read
  labels:
{{ include "cl.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cl.fullname" . }}-fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: {{ include "cl.fullname" . }}-fluent-bit
    namespace: {{ include "cl.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cl.fullname" . }}-fluent-bit-config
  namespace: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                     {{ .Values.fluentBit.flush }}
        Daemon                    Off
        Log_Level                 {{ .Values.fluentBit.logLevel }}
        Parsers_File              parsers.conf
        HTTP_Server               On
        HTTP_Listen               0.0.0.0
        HTTP_Port                 {{ .Values.fluentBit.metricsPort }}
        storage.path              /buffers
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit {{ .Values.fluentBit.storageBacklogMemLimit }}

    [INPUT]
        Name                      tail
        Tag                       kube.*
        Path                      /var/log/containers/*.log
        Exclude_Path              {{ .Values.fluentBit.excludePath }}
        multiline.parser          docker, cri
        DB                        /buffers/flb_kube.db
        Mem_Buf_Limit             {{ .Values.fluentBit.memBufLimit }}
        Skip_Long_Lines           On
        Refresh_Interval          5
        Rotate_Wait               30
        storage.type              filesystem
        Read_from_Head            Off

    [FILTER]
        Name                      kubernetes
        Match                     kube.*
        Kube_URL                  https://kubernetes.default.svc:443
        Kube_CA_File              /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File           /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix           kube.var.log.containers.
        Merge_Log                 On
        Keep_Log                  Off
        K8S-Logging.Parser        On
        K8S-Logging.Exclude       On
        Labels                    On
        Annotations               Off

    [FILTER]
        Name                      modify
        Match                     kube.*
        Add                       cluster {{ .Values.global.clusterName }}

    [OUTPUT]
        Name                      kafka
        Match                     kube.*
        Brokers                   {{ include "cl.kafkaName" . }}-kafka-bootstrap.{{ include "cl.namespace" . }}.svc.cluster.local:9092
        Topics                    {{ .Values.kafka.topics.raw.name }}
        Format                    json
        Timestamp_Key             @timestamp
        Retry_Limit               False
        Workers                   {{ .Values.fluentBit.kafka.workers }}
        rdkafka.client.id         fluent-bit
        rdkafka.request.required.acks {{ .Values.fluentBit.kafka.requiredAcks }}
        rdkafka.queue.buffering.max.kbytes 1048576
        rdkafka.message.timeout.ms {{ .Values.fluentBit.kafka.messageTimeoutMs }}

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "cl.fullname" . }}-fluent-bit
  namespace: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
    app.kubernetes.io/name: fluent-bit
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
      app.kubernetes.io/instance: {{ .Release.Name }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.fluentBit.metricsPort | quote }}
        prometheus.io/path: "/api/v1/metrics/prometheus"
{{- with .Values.fluentBit.annotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "cl.fullname" . }}-fluent-bit
      priorityClassName: {{ .Values.global.priorityClasses.agentName }}
      terminationGracePeriodSeconds: 30
{{- with .Values.fluentBit.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.fluentBit.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.fluentBit.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: fluent-bit
          image: "{{ .Values.fluentBit.image.repository }}:{{ .Values.fluentBit.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.fluentBit.metricsPort }}
              protocol: TCP
          resources:
{{ toYaml .Values.fluentBit.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: buffers
              mountPath: /buffers
      volumes:
        - name: config
          configMap:
            name: {{ include "cl.fullname" . }}-fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        - name: buffers
          hostPath:
            path: {{ .Values.fluentBit.bufferPath }}
            type: DirectoryOrCreate
{{- end }}
