{{- if and .Values.elasticsearch.enabled .Values.kibana.enabled }}
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: {{ include "cl.kibanaName" . }}
  namespace: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
spec:
  version: {{ .Values.elasticsearch.version | quote }}
  count: {{ .Values.kibana.count }}
  elasticsearchRef:
    name: {{ include "cl.esName" . }}
  http:
    tls:
      selfSignedCertificate:
        disabled: false
  config:
    server.publicBaseUrl: {{ .Values.kibana.publicBaseUrl | quote }}
    xpack.reporting.roles.enabled: false
  podTemplate:
    spec:
      priorityClassName: {{ .Values.global.priorityClasses.criticalName }}
      containers:
        - name: kibana
          resources:
{{ toYaml .Values.kibana.resources | indent 12 }}
{{- if .Values.kibana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cl.kibanaName" . }}
  namespace: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
{{- with .Values.kibana.ingress.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  ingressClassName: {{ .Values.kibana.ingress.className | quote }}
{{- if .Values.kibana.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.kibana.ingress.host | quote }}
      secretName: {{ .Values.kibana.ingress.tlsSecretName | quote }}
{{- end }}
  rules:
    - host: {{ .Values.kibana.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cl.kibanaName" . }}-kb-http
                port:
                  number: 5601
{{- end }}
{{- end }}
