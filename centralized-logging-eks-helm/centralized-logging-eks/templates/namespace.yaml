{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "cl.namespace" . }}
  labels:
{{ include "cl.labels" . | indent 4 }}
{{- with .Values.namespace.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- with .Values.namespace.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
{{- end }}
